  #     POSTGRES_DB: omnidrive
  #     POSTGRES_USER: omnidrive
  #     POSTGRES_PASSWORD: omnidrive_secure_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U omnidrive"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3
  #   restart: unless-stopped

volumes:
  redis_data:
